<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Z勇者塔 (Z-Tower)</title>
    <!-- 引入 Tailwind CSS 提供優雅的現代 UI 框架 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Inter & Press Start 2P 像素風字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0f19;
            touch-action: manipulation;
        }
        .pixel-font {
            font-family: 'Press Start 2P', monospace;
        }
        canvas {
            image-rendering: pixelated;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 text-white overflow-x-hidden">

<div class="flex flex-col items-center justify-center w-full max-w-4xl gap-4">
    <!-- 頂部遊戲標題與計分板 -->
    <div class="w-full bg-slate-900/80 border border-slate-700/50 rounded-2xl p-4 flex flex-col md:flex-row justify-between items-center gap-4 backdrop-blur-md shadow-2xl">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-xl shadow-lg shadow-indigo-500/30">🏰</div>
            <div>
                <h1 class="text-lg font-bold tracking-wide text-indigo-400">Z勇者塔 (Z-Tower) <span class="text-xs text-yellow-500 font-normal"></span></h1>
            </div>
        </div>
        <div class="flex items-center gap-6">
            <div class="text-center">
                <span class="text-xs uppercase text-slate-500 font-semibold block">目前樓層</span>
                <span id="ui-floor" class="pixel-font text-xl text-yellow-400 font-bold">0 F</span>
            </div>
            <div class="h-8 w-px bg-slate-700"></div>
            <div class="text-center">
                <span class="text-xs uppercase text-slate-500 font-semibold block">裝備狀態</span>
                <span id="ui-weapon" class="text-sm font-semibold text-slate-300">徒手 ✊</span>
            </div>
        </div>
    </div>

    <!-- 遊戲核心畫布 -->
    <div class="flex flex-col md:flex-row gap-4 w-full justify-center items-stretch">
        <div class="relative flex-1 flex justify-center items-center bg-black/40 rounded-2xl border border-slate-700/50 p-2 shadow-inner">
            <canvas id="gameCanvas" width="600" height="700" class="rounded-xl max-w-full h-auto shadow-2xl bg-slate-950"></canvas>
            
            <div id="screen-overlay" class="absolute inset-0 bg-slate-950/95 rounded-2xl flex flex-col items-center justify-center p-6 text-center z-20">
                <div class="pixel-font text-3xl text-yellow-500 mb-4 animate-pulse">Z-TOWER</div>
                <p class="text-slate-300 max-w-md text-sm mb-6 leading-relaxed">
                    這是一座由神祕代碼編織的百層高塔。踏上平滑的 Z 字階梯，踩踏或擊殺怪物向上前行！解鎖更高樓層，挑戰無盡魔物！
                </p>
                
                <div class="bg-slate-900/80 border border-slate-700 p-4 rounded-xl mb-6 text-left text-xs text-slate-400 space-y-2 w-full max-w-xs">
                    <div class="flex justify-between"><span>A / D (或左/右)</span> <span class="text-white">左右移動 / 順應爬行</span></div>
                    <div class="flex justify-between"><span>W / S (或上/下)</span> <span class="text-white">上下爬梯 </span></div>
                    <div class="flex justify-between"><span>空白鍵 (Space)</span> <span class="text-white">跳躍 / 落地踩怪</span></div>
                    <div class="flex justify-between"><span>K 鍵</span> <span class="text-white">攻擊 / 開箱 / 拾取 / 施法</span></div>
                </div>

                <button id="btn-start" class="px-8 py-4 bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-bold rounded-xl shadow-lg shadow-indigo-500/30 hover:scale-105 transition duration-200">
                    進入高塔探索
                </button>
